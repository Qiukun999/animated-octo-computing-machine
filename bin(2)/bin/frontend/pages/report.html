<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人成长报告 - 个人发展规划系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary no-print">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">个人发展规划系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">课程管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="grades.html">成绩管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="experiences.html">经历管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="achievements.html">奖项管理</a></li>
                    <li class="nav-item"><a class="nav-link active" href="report.html">成长报告</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
            <h2>个人成长报告</h2>
            <button class="btn btn-primary" onclick="window.print()">打印/导出PDF</button>
        </div>

        <!-- 个人信息 -->
        <div class="report-section">
            <h3>个人信息</h3>
            <div class="row" id="userInfo">
                <div class="col-md-6">
                    <p><strong>姓名：</strong><span id="userName">-</span></p>
                    <p><strong>专业：</strong><span id="userMajor">-</span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>年级：</strong><span id="userGrade">-</span></p>
                    <p><strong>邮箱：</strong><span id="userEmail">-</span></p>
                </div>
            </div>
        </div>

        <!-- 学业成绩 -->
        <div class="report-section">
            <h3>学业成绩</h3>
            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h5>GPA</h5>
                            <p class="display-6" id="reportGPA">0.00</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h5>平均分</h5>
                            <p class="display-6" id="reportAvgScore">0.00</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h5>总学分</h5>
                            <p class="display-6" id="reportCredits">0.0</p>
                        </div>
                    </div>
                </div>
            </div>
            <h5>课程列表</h5>
            <table class="table table-sm">
                <thead>
                    <tr>
                        <th>课程名称</th>
                        <th>学期</th>
                        <th>学分</th>
                        <th>成绩</th>
                        <th>绩点</th>
                    </tr>
                </thead>
                <tbody id="reportCourses">
                    <tr><td colspan="5" class="text-center">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 项目经历 -->
        <div class="report-section">
            <h3>项目与竞赛经历</h3>
            <div id="reportExperiences">
                <p class="text-muted">加载中...</p>
            </div>
        </div>

        <!-- 荣誉奖项 -->
        <div class="report-section">
            <h3>荣誉奖项</h3>
            <div id="reportAchievements">
                <p class="text-muted">加载中...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/report.js"></script>
</body>
</html>
