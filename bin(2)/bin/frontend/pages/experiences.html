<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经历管理 - 个人发展规划系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">个人发展规划系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">课程管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="grades.html">成绩管理</a></li>
                    <li class="nav-item"><a class="nav-link active" href="experiences.html">经历管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="achievements.html">奖项管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="report.html">成长报告</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>经历管理</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#experienceModal" onclick="openAddModal()">
                新增经历
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>类型</th>
                            <th>名称</th>
                            <th>角色</th>
                            <th>时间</th>
                            <th>技能</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="experienceTableBody">
                        <tr><td colspan="6" class="text-center">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 经历模态框 -->
    <div class="modal fade" id="experienceModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增经历</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="experienceForm">
                        <input type="hidden" id="experienceId">
                        <div class="mb-3">
                            <label for="expType" class="form-label">经历类型</label>
                            <select class="form-control" id="expType" required>
                                <option value="项目经历">项目经历</option>
                                <option value="竞赛经历">竞赛经历</option>
                                <option value="实习经历">实习经历</option>
                                <option value="社会实践">社会实践</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">经历名称</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="role" class="form-label">担任角色</label>
                            <input type="text" class="form-control" id="role">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="startDate" class="form-label">开始时间</label>
                                <input type="date" class="form-control" id="startDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="endDate" class="form-label">结束时间</label>
                                <input type="date" class="form-control" id="endDate" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">内容描述</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="skills" class="form-label">收获技能</label>
                            <input type="text" class="form-control" id="skills" placeholder="多个技能用逗号分隔">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveExperience()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/experiences.js"></script>
</body>
</html>
