<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理 - 个人发展规划系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">个人发展规划系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="courses.html">课程管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="grades.html">成绩管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="experiences.html">经历管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="achievements.html">奖项管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="report.html">成长报告</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>成绩管理</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#gradeModal" onclick="openAddModal()">
                录入成绩
            </button>
        </div>

        <!-- GPA统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <h5 class="card-title">当前GPA</h5>
                        <p class="display-4" id="currentGPA">0.00</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info">
                    <div class="card-body text-center">
                        <h5 class="card-title">平均分</h5>
                        <p class="display-4" id="averageScore">0.00</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning">
                    <div class="card-body text-center">
                        <h5 class="card-title">总学分</h5>
                        <p class="display-4" id="totalCredits">0.0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>课程名称</th>
                            <th>学分</th>
                            <th>成绩</th>
                            <th>绩点</th>
                            <th>考核时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="gradeTableBody">
                        <tr>
                            <td colspan="6" class="text-center">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 成绩模态框 -->
    <div class="modal fade" id="gradeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">录入成绩</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="gradeForm">
                        <input type="hidden" id="gradeId">
                        <div class="mb-3">
                            <label for="courseId" class="form-label">选择课程</label>
                            <select class="form-control" id="courseId" required>
                                <option value="">请选择课程</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="score" class="form-label">成绩</label>
                            <input type="number" step="0.1" min="0" max="100" class="form-control" id="score" required>
                            <small class="form-text text-muted">系统将自动计算绩点</small>
                        </div>
                        <div class="mb-3">
                            <label for="examTime" class="form-label">考核时间</label>
                            <input type="date" class="form-control" id="examTime" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveGrade()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/grades.js"></script>
</body>
</html>
