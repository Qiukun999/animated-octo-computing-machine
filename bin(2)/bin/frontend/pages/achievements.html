<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖项管理 - 个人发展规划系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">个人发展规划系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">课程管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="grades.html">成绩管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="experiences.html">经历管理</a></li>
                    <li class="nav-item"><a class="nav-link active" href="achievements.html">奖项管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="report.html">成长报告</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>奖项管理</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#achievementModal" onclick="openAddModal()">
                新增奖项
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>奖项名称</th>
                            <th>类别</th>
                            <th>级别</th>
                            <th>获得时间</th>
                            <th>说明</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="achievementTableBody">
                        <tr><td colspan="6" class="text-center">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 奖项模态框 -->
    <div class="modal fade" id="achievementModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增奖项</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="achievementForm">
                        <input type="hidden" id="achievementId">
                        <div class="mb-3">
                            <label for="title" class="form-label">奖项名称</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">类别</label>
                            <select class="form-control" id="category" required>
                                <option value="奖学金">奖学金</option>
                                <option value="荣誉称号">荣誉称号</option>
                                <option value="竞赛奖项">竞赛奖项</option>
                                <option value="资格证书">资格证书</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="level" class="form-label">级别</label>
                            <select class="form-control" id="level" required>
                                <option value="国家级">国家级</option>
                                <option value="省级">省级</option>
                                <option value="市级">市级</option>
                                <option value="校级">校级</option>
                                <option value="院级">院级</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">获得时间</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">说明</label>
                            <textarea class="form-control" id="description" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveAchievement()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/achievements.js"></script>
</body>
</html>
