<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理 - 个人发展规划系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">个人发展规划系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="courses.html">课程管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="grades.html">成绩管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="experiences.html">经历管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="achievements.html">奖项管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="report.html">成长报告</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>课程管理</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#courseModal" onclick="openAddModal()">
                新增课程
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>课程名称</th>
                            <th>学期</th>
                            <th>学分</th>
                            <th>课程类型</th>
                            <th>任课教师</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody">
                        <tr>
                            <td colspan="7" class="text-center">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 课程模态框 -->
    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增课程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="courseForm">
                        <input type="hidden" id="courseId">
                        <div class="mb-3">
                            <label for="courseName" class="form-label">课程名称</label>
                            <input type="text" class="form-control" id="courseName" required>
                        </div>
                        <div class="mb-3">
                            <label for="semester" class="form-label">学期</label>
                            <input type="text" class="form-control" id="semester" placeholder="例如: 2022-2023-1" required>
                        </div>
                        <div class="mb-3">
                            <label for="credit" class="form-label">学分</label>
                            <input type="number" step="0.5" class="form-control" id="credit" required>
                        </div>
                        <div class="mb-3">
                            <label for="courseType" class="form-label">课程类型</label>
                            <select class="form-control" id="courseType" required>
                                <option value="必修">必修</option>
                                <option value="选修">选修</option>
                                <option value="通识">通识</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="teacher" class="form-label">任课教师</label>
                            <input type="text" class="form-control" id="teacher">
                        </div>
                        <div class="mb-3">
                            <label for="remark" class="form-label">备注</label>
                            <textarea class="form-control" id="remark" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveCourse()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/courses.js"></script>
</body>
</html>
