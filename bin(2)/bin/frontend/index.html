<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生个人发展规划管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">个人发展规划系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/courses.html">课程管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/grades.html">成绩管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/experiences.html">经历管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/achievements.html">奖项管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/report.html">成长报告</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="jumbotron text-center bg-light p-5 rounded">
            <h1 class="display-4">欢迎使用个人发展规划管理系统</h1>
            <p class="lead">记录大学四年成长轨迹，管理课程、成绩、项目经历与荣誉奖项</p>
            <hr class="my-4">
            <p>系统化管理您的学业信息，为评优、保研、求职做好准备</p>
        </div>

        <div class="row mt-5" id="statsCards">
            <div class="col-md-3">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">总课程数</h5>
                        <p class="card-text display-4" id="totalCourses">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">当前GPA</h5>
                        <p class="card-text display-4" id="currentGPA">0.00</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info mb-3">
                    <div class="card-body">
                        <h5 class="card-title">经历数量</h5>
                        <p class="card-text display-4" id="totalExperiences">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-body">
                        <h5 class="card-title">奖项数量</h5>
                        <p class="card-text display-4" id="totalAchievements">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5>快速导航</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <a href="pages/courses.html" class="btn btn-outline-primary btn-lg w-100">课程管理</a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="pages/grades.html" class="btn btn-outline-success btn-lg w-100">成绩管理</a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="pages/experiences.html" class="btn btn-outline-info btn-lg w-100">经历管理</a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="pages/achievements.html" class="btn btn-outline-warning btn-lg w-100">奖项管理</a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="pages/report.html" class="btn btn-outline-danger btn-lg w-100">成长报告</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
